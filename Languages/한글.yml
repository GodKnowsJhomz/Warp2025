tabs:
    - 패치
    - 확장 기능
    - 테스트
    - 결과

##========================#
## File/Dir Dialog titles #
##========================#

dialogs:
    dir: 테스트 exe 파일들이 들어 있는 디렉터리를 선택하세요
    src: 원본 exe 파일을 선택하세요
    tgt: 대상 exe 파일을 선택하세요
    loadS: 불러올 세션 파일을 선택하세요
    saveS: 저장할 세션 파일을 선택하세요

actions:

    #==============#
    # Patches Page #
    #==============#
      
    getPatches:
        title:  패치<br>가져오기
        tooltip: 정의된 모든 패치를 리스트에 채웁니다
    
    selVisiblePatches:
        title: 보이는 것<br>선택
        tooltip: 현재 보이는 모든 패치를 선택합니다
    
    clearSelPatches:
        title: 선택 항목<br>지우기
        tooltip: 선택된 모든 패치를 지웁니다
    
    #=================#
    # Extensions Page #
    #=================#
    
    getExtns:
        title: 확장 기능<br>가져오기
        tooltip: 정의된 모든 확장 기능을 리스트에 채웁니다

    
    selVisibleExtns:
        title: 보이는 것<br>선택
        tooltip: 현재 보이는 모든 확장 기능을 선택합니다
    
    clearSelExtns:
        title: 선택 항목<br>지우기
        tooltip: 선택된 모든 확장 기능을 지웁니다
    
    #==============#
    # Testers Page #
    #==============#
    
    getExes: 
        title: Exe 가져오기
        tooltip: 테스트 디렉터리에서 발견된 모든 .exe 파일을 리스트에 채웁니다
    
    selVisibleExes:
        title: 보이는 것<br>선택
        tooltip: 현재 보이는 모든 exe 파일을 선택합니다
    
    clearSelExes:
        title: 선택 항목<br>지우기
        tooltip: 선택된 모든 exe 파일을 지웁니다
    
    #==============#
    # Results Page #
    #==============#
    
    runTest: 
        title: 테스트 실행
        tooltip: 선택된 exe 파일 리스트에서 선택된 패치와 확장 기능을 테스트하고 '결과' 탭에 표시합니다
    
    #=======================#
    # Script Window related #
    #=======================#
    
    showScriptWin:
        title: 스크립트 창 표시
        tooltip: 스크립트 테스트를 빠르게 하기 위해 (Alt+W) 스크립트 창을 표시합니다
    
#=========================#
    # Remaining Quick Actions #
    #=========================#
    
    loadSrcExe:
        title: 파일<br>불러오기
        tooltip: 원본 exe 파일을 불러옵니다 (스크립트가 아직 불러와지지 않았다면 함께 불러옵니다)
    
    applyPatches: 
        title: 패치<br>적용
        tooltip: 선택된 패치를 불러온 exe에 적용하고 출력 파일로 저장합니다
    
    selectPrev:
        title: 이전<br>선택
        tooltip: 마지막에 적용된 모든 패치를 선택합니다
    
    selectRcmd:
        title: 추천<br>선택
        tooltip: <b>'추천'</b>됨 으로 표시된 모든 패치를 선택합니다
    
    loadChangedScripts:
        title: 스크립트<br>불러오기
        tooltip: (Alt+C) 마지막 불러오기 이후 수정된 모든 .qjs 스크립트 파일을 'Scripts' 디렉터리 내 'Patches', 'Support', 'Extensions' 하위 폴더에서 불러옵니다
    
    clearOutput:
        title: 지우기
        tooltip: <b>'출력'</b> 화면을 지웁니다
    
    evalScript: 
        title: 평가
        tooltip: (Ctrl+R) 에디터의 스크립트를 실행하고 결과를 출력에 표시합니다
    
    clearEditor: 
        title: 지우기
        tooltip: 스크립트 에디터를 지웁니다
    
    #================#
    # Filter Options #
    #================#
    
    rexBtn:
        tooltip: 정규 표현식 또는 전체 일치 여부를 선택합니다
    
    csBtn:
        tooltip: 대소문자 구분 여부를 선택합니다 
    
    #============#
    # Menu Items #
    #============#
    
    loadPatchScripts:
        title: <b>'패치'</b>에서 불러오기
        tooltip: (Alt+P) 'Scripts/Patchs' 디렉터리의 모든 .qjs 스크립트 파일을 불러옵니다
    
    loadExtnScripts:
        title: <b>'확장 기능'</b>에서 불러오기
        tooltip: (Alt+E) 'Scripts/Extensions' 디렉터리의 모든 .qjs 스크립트 파일을 불러옵니다
    
    loadSuppScripts:
        title: <b>'지원'</b>에서 불러오기
        tooltip: (Alt+S) 'Scripts/Support' 디렉터리의 모든 .qjs 스크립트 파일을 불러옵니다
    
    loadAllScripts:
        title: 모든 스크립트<br>불러오기
        tooltip: (Alt+A) 'Scripts' 디렉터리 내 'Patches', 'Support', 'Extensions' 하위 폴더의 모든 .qjs 스크립트 파일을 불러옵니다
    
    loadSession:
        title: 세션 파일 불러오기
        tooltip: 지정된 세션 파일에서 모든 패치 선택과 입력을 불러옵니다
    
    saveSession:
        title: 세션 파일 저장
        tooltip: 모든 패치 선택과 입력을 지정된 세션 파일에 저장합니다
    
    refreshLanguages:
        title: 언어 새로고침
        tooltip: <b>'Languages'</b> 폴더의 .yml 파일에서 제공된 언어 목록을 불러옵니다
    
    refreshStyles:
        title: 스타일 새로고침
        tooltip: <b>'Styles'</b> 폴더의 .yml 파일에서 제공된 스타일 목록을 불러옵니다
    
    loadExtns:
        title: 확장 기능 불러오기
        tooltip: 정의된 모든 확장 기능을 확장 기능 창에 채웁니다
    
    pro2Session:
        title: 프로필을 세션으로 변환
        tooltip: NEMO 프로필을 WARP에서 사용하는 세션 파일로 변환합니다
    
    genSecFile:
        title: 보안 파일 생성
        tooltip: 입력 파일(실행 파일일 수도 아닐 수도 있음)의 여러 해시를 포함하는 보안 파일을 생성합니다
    
    #=========================#
    # Settings Dialog related #
    #=========================#
    saveResolution:
        title: 해상도 저장
        tooltip: 현재 테스트 창의 해상도를 기본값으로 저장합니다
    
    keepTestInputs:
        title: 테스트 입력 유지
        tooltip: 이후 테스트에서 이전에 저장된 입력을 유지하는 옵션입니다
    
    stopAtError:
        title: 오류 시 중지
        tooltip: 첫 번째 오류가 발생하면 테스트 실행을 중지하는 옵션입니다
    
    saveResolutions:
        title: 해상도 저장
        tooltip: 메인 창과 스크립트 창의 현재 해상도를 기본값으로 저장합니다
    
    showVersion:
        title: 불러온 버전 표시
        tooltip: 불러온 exe의 빌드 버전과 날짜를 표시하도록 설정합니다
        
    enableEPI:
        title: EPI 활성화
        tooltip: exe 파일과 함께 EPI 파일을 생성 및 불러옵니다. 주의해서 사용하세요.
    
    genTgtSecure:
        title: <destino>.secure.txt 생성
        tooltip: 대상 exe 파일과 함께 보안 파일(.secure.txt)을 생성하도록 설정합니다
    
    genTgtSession:
        title: "대상 세션 생성"
        tooltip: 대상 exe 파일과 함께 이후 사용할 세션 파일을 생성하도록 설정합니다
    
    keepInputs:
        title: 세션 입력 유지
        tooltip: 세션 파일을 불러올 때 입력을 하나씩 묻지 않고 저장된 입력을 유지하는 옵션입니다
    
