      replace: 파일 이름
    
    - find: Inbuilt
      replace: 내장됨
    
    - find: From Scripts
      replace: 스크립트에서
    
    - find: Refresh
      replace: 새로고침
    
    - find: Session
      replace: 세션
    
    - find: Find
